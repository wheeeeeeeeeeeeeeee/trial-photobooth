<!doctype html>
<html>
<head>
    <title>Customise</title>
    <link rel = 'stylesheet' href = 'style.css'>
</head>

<body>
    <div class = 'customise'>
        <div class = 'photostrip_div'>
            <canvas id = 'stripImage'></canvas>
        </div>

        <div class = 'right'>
            <h1>CUSTOMISE!</h1>
            <div id = 'colours'>
                <h2>BACKGROUND COLOUR</h2>
                <div class = 'choices'>
                    <!-- ADD COLOURS -->
                    <button id = 'whiteB'></button>
                    <button id = 'pinkB'></button>
                    <button id = 'blueB'></button>
                    <button id = 'greenB'></button>
                </div>

            </div>

            <div id = 'theme'>
                <h2>THEME</h2>
                <!-- add stuff -->
                <div class = 'choices'>
                    <!-- ADD THEMES -->
                    <button id = 'noneB'>
                        <img src = 'icons/none.png'>
                    </button>
                    <button id = 'duckB'>
                        <img src = 'icons/duck.png'>
                    </button>
                </div>
            </div>

        <div class = 'buttons'>
            <button id = 'download'>DOWNLOAD</button>
            <button id = 'home'>HOME</button>
        </div>

    </div>




	<script src = "script.js"></script>

</body>
</html>
